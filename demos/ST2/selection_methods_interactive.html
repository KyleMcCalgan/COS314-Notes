<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Selection Methods Interactive</title>
<style>
  *, *::before, *::after { box-sizing: border-box; }
  body {
    margin: 0;
    padding: 18px;
    font-family: 'Segoe UI', Arial, sans-serif;
    background: #0f1117;
    color: #e0d8c8;
  }
  :root {
    --color-border-primary: #4d5570;
    --color-border-secondary: #252830;
    --color-border-tertiary: #1e2028;
    --color-background-primary: #0f1117;
    --color-background-secondary: #1c1f2b;
    --color-background-info: #1f2637;
    --color-text-primary: #e0d8c8;
    --color-text-secondary: #a0988a;
    --border-radius-md: 6px;
    --border-radius-lg: 10px;
  }
  .sr-only {
    position: absolute;
    width: 1px;
    height: 1px;
    padding: 0;
    margin: -1px;
    overflow: hidden;
    clip: rect(0, 0, 0, 0);
    white-space: nowrap;
    border: 0;
  }
  .tab-btn { padding: 8px 18px; border: 0.5px solid var(--color-border-secondary); background: transparent; border-radius: var(--border-radius-md); cursor: pointer; font-size: 14px; color: var(--color-text-secondary); transition: all 0.15s; }
  .tab-btn.active { background: var(--color-background-secondary); color: var(--color-text-primary); font-weight: 500; border-color: var(--color-border-primary); }
  .indiv-bar { display: flex; align-items: center; gap: 10px; margin: 5px 0; }
  .bar-fill { height: 24px; border-radius: 4px; display: flex; align-items: center; padding: 0 8px; font-size: 12px; font-weight: 500; transition: width 0.4s, background 0.3s; min-width: 32px; white-space: nowrap; }
  .indiv-label { font-size: 13px; color: var(--color-text-secondary); width: 28px; flex-shrink: 0; }
  .fitness-num { font-size: 13px; color: var(--color-text-secondary); width: 28px; text-align: right; flex-shrink: 0; }
  .highlight-row { background: var(--color-background-info); border-radius: var(--border-radius-md); padding: 2px 6px; }
  .result-box { border: 0.5px solid var(--color-border-secondary); border-radius: var(--border-radius-lg); padding: 14px 18px; margin-top: 16px; background: var(--color-background-secondary); }
  .btn-run { padding: 9px 22px; border: 0.5px solid var(--color-border-secondary); background: transparent; border-radius: var(--border-radius-md); cursor: pointer; font-size: 14px; font-weight: 500; color: var(--color-text-primary); }
  .btn-run:hover { background: var(--color-background-secondary); }
  .tournament-slot { border: 0.5px solid var(--color-border-tertiary); border-radius: var(--border-radius-md); padding: 8px 12px; font-size: 13px; display: flex; justify-content: space-between; align-items: center; margin: 4px 0; transition: border-color 0.3s, background 0.3s; }
  .tournament-slot.winner { border-color: #1D9E75; background: #E1F5EE; color: #085041; }
  .wheel-seg { transition: opacity 0.3s; cursor: default; }
  .wheel-seg.dim { opacity: 0.25; }
  .section-panel { display: none; }
  .section-panel.active { display: block; }
</style>
</head>
<body>
<h2 class="sr-only">Interactive selection methods explorer for evolutionary algorithms</h2>

<div style="padding: 1rem 0;">
  <div style="display: flex; gap: 8px; margin-bottom: 24px; flex-wrap: wrap;">
    <button class="tab-btn active" onclick="switchTab('tournament')">Tournament</button>
    <button class="tab-btn" onclick="switchTab('roulette')">Fitness proportionate</button>
    <button class="tab-btn" onclick="switchTab('rank')">Rank</button>
  </div>

  <div id="panel-tournament" class="section-panel active">
    <div style="margin-bottom: 14px; display: flex; align-items: center; gap: 16px; flex-wrap: wrap;">
      <label style="font-size: 14px; color: var(--color-text-secondary);">Tournament size</label>
      <input type="range" min="1" max="10" value="4" id="t-size" step="1" style="width: 140px;" oninput="document.getElementById('t-size-out').textContent=this.value" />
      <span id="t-size-out" style="font-size: 15px; font-weight: 500; min-width: 16px;">4</span>
      <button class="btn-run" onclick="runTournament()">Run tournament ↗</button>
    </div>
    <div id="tournament-arena" style="margin-top: 8px;"></div>
    <div id="tournament-result" class="result-box" style="display:none;"></div>
  </div>

  <div id="panel-roulette" class="section-panel">
    <div style="display: flex; gap: 24px; align-items: flex-start; flex-wrap: wrap;">
      <div style="flex: 1; min-width: 200px;">
        <p style="font-size: 13px; color: var(--color-text-secondary); margin: 0 0 12px;">Each individual's slice = fitness / total fitness</p>
        <div id="roulette-bars"></div>
      </div>
      <div style="display: flex; flex-direction: column; align-items: center; gap: 12px;">
        <svg id="wheel-svg" width="200" height="200" viewBox="-1 -1 202 202"></svg>
        <button class="btn-run" onclick="spinWheel()">Spin wheel ↗</button>
        <div id="roulette-result" style="font-size: 14px; text-align: center; min-height: 40px; color: var(--color-text-primary);"></div>
      </div>
    </div>
  </div>

  <div id="panel-rank" class="section-panel">
    <p style="font-size: 13px; color: var(--color-text-secondary); margin: 0 0 14px;">Sorted worst → best. Probability = rank / sum of all ranks (sum = 55)</p>
    <div id="rank-bars"></div>
    <div style="margin-top: 14px; display: flex; gap: 12px; align-items: center; flex-wrap: wrap;">
      <button class="btn-run" onclick="runRank()">Select individual ↗</button>
      <div id="rank-result" style="font-size: 14px; color: var(--color-text-primary);"></div>
    </div>
  </div>
</div>

<script>
const pop = [
  {name:'P1', fitness:41}, {name:'P2', fitness:23}, {name:'P3', fitness:49},
  {name:'P4', fitness:40}, {name:'P5', fitness:4},  {name:'P6', fitness:20},
  {name:'P7', fitness:47}, {name:'P8', fitness:59}, {name:'P9', fitness:21},
  {name:'P10',fitness:42}
];
const total = pop.reduce((s,p)=>s+p.fitness,0);

const rampColors = [
  ['#AFA9EC','#26215C'], ['#5DCAA5','#04342C'], ['#F0997B','#4A1B0C'],
  ['#85B7EB','#042C53'], ['#97C459','#173404'], ['#EF9F27','#412402'],
  ['#ED93B1','#4B1528'], ['#B4B2A9','#2C2C2A'], ['#F09595','#501313'],
  ['#B5D4F4','#042C53']
];

function switchTab(name) {
  document.querySelectorAll('.tab-btn').forEach((b,i)=> b.classList.toggle('active', ['tournament','roulette','rank'][i]===name));
  document.querySelectorAll('.section-panel').forEach(p=> p.classList.remove('active'));
  document.getElementById('panel-'+name).classList.add('active');
  if(name==='roulette') buildRoulettePanel();
  if(name==='rank') buildRankPanel();
}

function runTournament() {
  const t = parseInt(document.getElementById('t-size').value);
  const shuffled = [...pop].sort(()=>Math.random()-0.5).slice(0,t);
  shuffled.sort((a,b)=>b.fitness-a.fitness);
  const winner = shuffled[0];
  const arena = document.getElementById('tournament-arena');
  arena.innerHTML = '<p style="font-size:13px;color:var(--color-text-secondary);margin:0 0 8px;">Randomly selected contestants:</p>' +
    shuffled.map((p,i)=>{
      const isWin = i===0;
      const [bg,fg] = isWin ? ['#E1F5EE','#085041'] : ['var(--color-background-secondary)','var(--color-text-secondary)'];
      return `<div class="tournament-slot ${isWin?'winner':''}" style="${isWin?'border-color:#1D9E75;background:#E1F5EE;':''}">
        <span style="font-size:13px;font-weight:${isWin?500:400};color:${fg};">${p.name} ${isWin?'👑':''}</span>
        <span style="font-size:13px;font-weight:500;color:${fg};">fitness: ${p.fitness}</span>
      </div>`;
    }).join('');
  const res = document.getElementById('tournament-result');
  res.style.display='block';
  res.innerHTML=`<span style="font-size:13px;color:var(--color-text-secondary);">Winner selected as parent:</span><br>
    <span style="font-size:16px;font-weight:500;color:var(--color-text-primary);">${winner.name} — fitness ${winner.fitness}</span>`;
}

function buildRoulettePanel() {
  const barsEl = document.getElementById('roulette-bars');
  const maxW = 200;
  barsEl.innerHTML = pop.map((p,i)=>{
    const pct = (p.fitness/total*100).toFixed(1);
    const w = Math.max(32, p.fitness/total*maxW);
    const [bg,fg] = rampColors[i];
    return `<div class="indiv-bar">
      <span class="indiv-label">${p.name}</span>
      <div class="bar-fill" id="rb-${i}" style="width:${w}px;background:${bg};color:${fg};">${pct}%</div>
      <span class="fitness-num">${p.fitness}</span>
    </div>`;
  }).join('');
  drawWheel();
}

function drawWheel() {
  const svg = document.getElementById('wheel-svg');
  const cx=100,cy=100,r=98;
  let angle=0;
  svg.innerHTML='';
  pop.forEach((p,i)=>{
    const slice = p.fitness/total*2*Math.PI;
    const x1=cx+r*Math.cos(angle), y1=cy+r*Math.sin(angle);
    const x2=cx+r*Math.cos(angle+slice), y2=cy+r*Math.sin(angle+slice);
    const large=slice>Math.PI?1:0;
    const mid=angle+slice/2;
    const path=document.createElementNS('http://www.w3.org/2000/svg','path');
    path.setAttribute('d',`M${cx},${cy} L${x1},${y1} A${r},${r} 0 ${large},1 ${x2},${y2} Z`);
    path.setAttribute('fill',rampColors[i][0]);
    path.setAttribute('stroke','var(--color-background-primary)');
    path.setAttribute('stroke-width','1.5');
    path.setAttribute('id',`seg-${i}`);
    path.setAttribute('class','wheel-seg');
    svg.appendChild(path);
    if(slice>0.18){
      const tx=cx+(r*0.65)*Math.cos(mid), ty=cy+(r*0.65)*Math.sin(mid);
      const txt=document.createElementNS('http://www.w3.org/2000/svg','text');
      txt.setAttribute('x',tx); txt.setAttribute('y',ty);
      txt.setAttribute('text-anchor','middle'); txt.setAttribute('dominant-baseline','middle');
      txt.setAttribute('font-size','10'); txt.setAttribute('fill',rampColors[i][1]);
      txt.setAttribute('font-weight','500');
      txt.textContent=p.name;
      svg.appendChild(txt);
    }
    angle+=slice;
  });
  const needle=document.createElementNS('http://www.w3.org/2000/svg','polygon');
  needle.setAttribute('points','97,8 103,8 100,28');
  needle.setAttribute('fill','var(--color-text-primary)');
  needle.setAttribute('id','needle');
  svg.appendChild(needle);
}

function spinWheel() {
  const r=Math.random();
  let cum=0, winner=null, winnerIdx=0;
  pop.forEach((p,i)=>{ if(!winner){ cum+=p.fitness/total; if(r<=cum){winner=p;winnerIdx=i;}} });
  document.querySelectorAll('.wheel-seg').forEach((s,i)=>s.classList.toggle('dim',i!==winnerIdx));
  for(let i=0;i<pop.length;i++){
    const el=document.getElementById(`rb-${i}`);
    if(el) el.style.opacity = i===winnerIdx ? '1' : '0.35';
  }
  document.getElementById('roulette-result').innerHTML=
    `<span style="color:var(--color-text-secondary);font-size:13px;">Random: ${r.toFixed(3)}</span><br>
     <span style="font-size:15px;font-weight:500;">${winner.name} selected — ${(winner.fitness/total*100).toFixed(1)}% slice</span>`;
}

function buildRankPanel() {
  const sorted = [...pop].sort((a,b)=>a.fitness-b.fitness);
  const sumRanks = 55;
  const barsEl = document.getElementById('rank-bars');
  const maxW = 240;
  barsEl.innerHTML = sorted.map((p,i)=>{
    const rank=i+1;
    const pct=(rank/sumRanks*100).toFixed(1);
    const w=Math.max(32,rank/10*maxW);
    const [bg,fg]=rampColors[pop.findIndex(x=>x.name===p.name)];
    return `<div class="indiv-bar" id="rank-row-${p.name}">
      <span style="font-size:12px;color:var(--color-text-secondary);width:40px;flex-shrink:0;">rank ${rank}</span>
      <span class="indiv-label" style="width:32px;">${p.name}</span>
      <div class="bar-fill" style="width:${w}px;background:${bg};color:${fg};">${pct}%</div>
      <span class="fitness-num">${p.fitness}</span>
    </div>`;
  }).join('');
}

function runRank() {
  const sorted=[...pop].sort((a,b)=>a.fitness-b.fitness);
  const sumRanks=55;
  const r=Math.random();
  let cum=0,winner=null;
  sorted.forEach((p,i)=>{ if(!winner){ cum+=(i+1)/sumRanks; if(r<=cum) winner=p; } });
  if(!winner) winner=sorted[sorted.length-1];
  document.querySelectorAll('[id^="rank-row-"]').forEach(el=>{
    el.style.opacity = el.id===`rank-row-${winner.name}` ? '1' : '0.35';
  });
  const rank=sorted.findIndex(p=>p.name===winner.name)+1;
  document.getElementById('rank-result').innerHTML=
    `<span style="font-size:15px;font-weight:500;">${winner.name} selected</span> <span style="font-size:13px;color:var(--color-text-secondary);">— rank ${rank}, fitness ${winner.fitness}, ${(rank/sumRanks*100).toFixed(1)}% chance</span>`;
}

runTournament();
</script>
</body>
</html>
