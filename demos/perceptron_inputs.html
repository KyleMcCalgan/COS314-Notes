
<style>
*, *::before, *::after{box-sizing:border-box}
:root{
  --color-border-secondary:#34344e;
  --color-border-tertiary:#252534;
  --color-background-primary:#0f1117;
  --color-background-secondary:#181824;
  --color-background-info:#1d3142;
  --color-text-primary:#d8d8eb;
  --color-text-secondary:#b9b9d0;
  --color-text-tertiary:#8c8ca8;
  --color-text-info:#9cc9ec;
  --border-radius-md:6px;
  --border-radius-lg:10px;
  --font-mono:"JetBrains Mono","Consolas","Courier New",monospace;
}
html,body{margin:0;padding:0;background:#0f1117;color:var(--color-text-primary);font-family:"Segoe UI",Arial,sans-serif;line-height:1.45;overflow-x:hidden;overflow-y:auto}
h2.sr-only{position:absolute;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0,0,0,0);border:0}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.field{display:flex;flex-direction:column;gap:4px}
.field label{font-size:12px;color:var(--color-text-secondary)}
.field input{width:100%;box-sizing:border-box;padding:7px 10px;border-radius:var(--border-radius-md);border:0.5px solid var(--color-border-secondary);background:var(--color-background-primary);color:var(--color-text-primary);font-size:14px;font-family:var(--font-mono)}
.field input:focus{outline:none;border-color:var(--color-border-info)}
.card{background:var(--color-background-secondary);border-radius:var(--border-radius-lg);padding:12px 14px}
.sec-label{font-size:11px;color:var(--color-text-tertiary);text-transform:uppercase;letter-spacing:.05em;margin-bottom:8px}
.btn{padding:7px 18px;border-radius:var(--border-radius-md);border:0.5px solid var(--color-border-secondary);background:transparent;color:var(--color-text-primary);cursor:pointer;font-size:13px}
.btn:hover{background:var(--color-background-secondary)}
.btn:disabled{opacity:0.28;cursor:default}
.btn.hi{background:var(--color-background-info);color:var(--color-text-info);border-color:var(--color-border-info)}
.mono{font-family:var(--font-mono);font-size:13px;line-height:2;color:var(--color-text-primary)}
.pill{display:inline-block;padding:2px 10px;border-radius:20px;font-size:12px;font-weight:500}
.pill-ok{background:#E1F5EE;color:#085041}
.pill-err{background:#FCEBEB;color:#791F1F}
.wchip{display:inline-flex;gap:4px;padding:3px 9px;border-radius:var(--border-radius-md);font-size:12px;background:var(--color-background-secondary);border:0.5px solid var(--color-border-tertiary);font-family:var(--font-mono)}
.wchip.up{background:#E1F5EE;border-color:#5DCAA5;color:#085041}
.wchip.dn{background:#FCEBEB;border-color:#F09595;color:#791F1F}
.sdot{width:8px;height:8px;border-radius:50%;background:var(--color-border-secondary);flex-shrink:0}
.sdot.done{background:#1D9E75}
.sdot.active{background:#378ADD}
.perceptron-demo{padding:14px}
.perceptron-layout{display:grid;grid-template-columns:220px minmax(0,1fr);gap:14px;align-items:start}
@media(max-width:720px){
  .perceptron-demo{padding:12px}
  .perceptron-layout{grid-template-columns:1fr}
}
</style>

<h2 class="sr-only">Perceptron learning walkthrough with manual input fields</h2>
<div class="perceptron-demo">
<div class="perceptron-layout">

  <div style="display:flex;flex-direction:column;gap:10px">
    <div class="card">
      <div class="sec-label">Inputs</div>
      <div class="grid2">
        <div class="field"><label>p&#8321;</label><input id="p1" type="number" value="1" step="0.1" oninput="run()"></div>
        <div class="field"><label>p&#8322;</label><input id="p2" type="number" value="1" step="0.1" oninput="run()"></div>
        <div class="field" style="grid-column:1/-1"><label>target t (0 or 1)</label><input id="tg" type="number" value="0" step="1" min="0" max="1" oninput="run()"></div>
      </div>
    </div>

    <div class="card">
      <div class="sec-label">Initial weights</div>
      <div class="grid2">
        <div class="field"><label>w&#8321;</label><input id="w1" type="number" value="0.5" step="0.1" oninput="run()"></div>
        <div class="field"><label>w&#8322;</label><input id="w2" type="number" value="0.3" step="0.1" oninput="run()"></div>
        <div class="field" style="grid-column:1/-1"><label>bias b</label><input id="bi" type="number" value="0.2" step="0.1" oninput="run()"></div>
      </div>
    </div>

    <div class="card">
      <div class="sec-label">Learning</div>
      <div class="grid2">
        <div class="field"><label>rate &#945;</label><input id="lr" type="number" value="0.1" step="0.1" min="0.01" oninput="run()"></div>
        <div class="field"><label>threshold &#952;</label><input id="th" type="number" value="0.5" step="0.1" oninput="run()"></div>
      </div>
    </div>
  </div>

  <div style="display:flex;flex-direction:column;gap:10px">
    <canvas id="cvs" width="420" height="120" style="width:100%;border-radius:var(--border-radius-lg);border:0.5px solid var(--color-border-tertiary)"></canvas>

    <div style="display:flex;gap:6px;align-items:center;flex-wrap:wrap" id="dots"></div>

    <div class="card" style="min-height:150px">
      <div style="font-size:11px;color:var(--color-text-tertiary);text-transform:uppercase;letter-spacing:.05em;margin-bottom:8px" id="elabel"></div>
      <div class="mono" id="mtext"></div>
      <div style="display:flex;gap:6px;flex-wrap:wrap;margin-top:10px" id="chips"></div>
    </div>

    <div style="display:flex;gap:8px;align-items:center">
      <button class="btn" id="bp" onclick="go(-1)"><i class="ti ti-arrow-left" aria-hidden="true"></i> Back</button>
      <button class="btn hi" id="bn" onclick="go(1)">Next <i class="ti ti-arrow-right" aria-hidden="true"></i></button>
      <span style="margin-left:auto;font-size:12px;color:var(--color-text-tertiary)" id="cmsg"></span>
    </div>
  </div>
</div>
</div>

<script>
var eps=[], cur=0;
function g(id){return parseFloat(document.getElementById(id).value)||0;}

function compute(){
  var p1=g('p1'),p2=g('p2'),t=g('tg');
  var w1=g('w1'),w2=g('w2'),b=g('bi');
  var a=g('lr'),th=g('th');
  var out=[];
  for(var e=1;e<=15;e++){
    var n=parseFloat((w1*p1+w2*p2+b).toFixed(6));
    var o=n>=th?1:0;
    var err=t-o;
    var ok=err===0;
    var nw1=ok?w1:parseFloat((w1+a*err*p1).toFixed(6));
    var nw2=ok?w2:parseFloat((w2+a*err*p2).toFixed(6));
    var nb=ok?b:parseFloat((b+a*err).toFixed(6));
    out.push({e,p1,p2,t,w1,w2,b,n,o,err,ok,a,th,nw1,nw2,nb});
    if(ok)break;
    w1=nw1;w2=nw2;b=nb;
  }
  return out;
}

function drawChart(){
  var c=document.getElementById('cvs'),ctx=c.getContext('2d');
  var W=c.width,H=c.height;
  ctx.clearRect(0,0,W,H);
  var dark=window.matchMedia('(prefers-color-scheme:dark)').matches;
  var muted=dark?'#5F5E5A':'#B4B2A9', tc=dark?'#c2c0b6':'#3d3d3a';
  if(!eps.length)return;
  var th=eps[0].th;
  var ns=eps.map(function(s){return s.n;});
  var lo=Math.min.apply(null,ns.concat([0,th]))-0.3;
  var hi=Math.max.apply(null,ns.concat([th]))+0.3;
  var pL=40,pR=14,pT=14,pB=24,pw=W-pL-pR,ph=H-pT-pB;
  function px(i){return pL+(eps.length<2?pw/2:(i/(eps.length-1))*pw);}
  function py(v){return pT+ph-(v-lo)/(hi-lo)*ph;}

  ctx.strokeStyle=muted;ctx.lineWidth=0.5;ctx.globalAlpha=0.2;
  ctx.beginPath();ctx.moveTo(pL,pT);ctx.lineTo(pL,pT+ph);ctx.stroke();
  ctx.beginPath();ctx.moveTo(pL,pT+ph);ctx.lineTo(pL+pw,pT+ph);ctx.stroke();
  ctx.globalAlpha=1;

  var ty=py(th);
  ctx.beginPath();ctx.moveTo(pL,ty);ctx.lineTo(pL+pw,ty);
  ctx.strokeStyle='#D85A30';ctx.lineWidth=1;ctx.setLineDash([4,3]);ctx.stroke();ctx.setLineDash([]);
  ctx.fillStyle='#D85A30';ctx.font='10px sans-serif';ctx.textAlign='end';
  ctx.fillText('\u03b8='+th.toFixed(2),pL-2,ty+3);

  if(eps.length>1){
    ctx.beginPath();
    eps.forEach(function(s,i){i===0?ctx.moveTo(px(i),py(s.n)):ctx.lineTo(px(i),py(s.n));});
    ctx.strokeStyle=dark?'#5DCAA5':'#1D9E75';ctx.lineWidth=1.5;ctx.stroke();
  }

  eps.forEach(function(s,i){
    var act=i===cur,dn=i<cur;
    var col=s.ok?'#1D9E75':'#D85A30';
    ctx.beginPath();ctx.arc(px(i),py(s.n),act?6:4,0,Math.PI*2);
    ctx.fillStyle=act?col:(dn?col:muted);
    ctx.globalAlpha=act||dn?1:0.3;ctx.fill();ctx.globalAlpha=1;
    ctx.fillStyle=act?tc:muted;ctx.font=(act?'bold ':'')+'10px sans-serif';ctx.textAlign='center';
    ctx.fillText('E'+s.e,px(i),pT+ph+16);
    if(act){ctx.fillStyle=col;ctx.font='bold 10px sans-serif';ctx.fillText(s.n.toFixed(3),px(i),py(s.n)-9);}
  });
}

function render(){
  var s=eps[cur];
  if(!s)return;
  drawChart();

  var d='';
  eps.forEach(function(_,i){d+='<div class="sdot '+(i<cur?'done':i===cur?'active':'')+'" ></div>';});
  document.getElementById('dots').innerHTML=d;
  document.getElementById('elabel').textContent='Epoch '+s.e+' of '+eps.length;

  var ec='#D85A30', oc='#1D9E75';
  var fstr=s.n.toFixed(4)+(s.n>=s.th?' \u2265 ':' < ')+s.th.toFixed(2)+' \u2192 output = <strong>'+s.o+'</strong>';
  var html=
    'n = ('+s.w1.toFixed(3)+' \u00d7 '+s.p1+') + ('+s.w2.toFixed(3)+' \u00d7 '+s.p2+') + ('+s.b.toFixed(3)+')<br>'+
    'n = '+parseFloat((s.w1*s.p1).toFixed(4))+' + '+parseFloat((s.w2*s.p2).toFixed(4))+' + '+s.b.toFixed(3)+' = <strong>'+s.n.toFixed(4)+'</strong><br><br>'+
    fstr+'<br><br>'+
    'error = '+s.t+' \u2212 '+s.o+' = <strong style="color:'+(s.ok?oc:ec)+'">'+s.err+'</strong>  ';

  if(s.ok){
    html+='<span class="pill pill-ok">correct \u2014 no update needed</span>';
  } else {
    html+='<span class="pill pill-err">wrong \u2014 updating weights</span><br><br>'+
    'w\u2081 = '+s.w1.toFixed(3)+' + ('+s.a.toFixed(2)+' \u00d7 '+s.err+' \u00d7 '+s.p1+') = <strong>'+s.nw1.toFixed(4)+'</strong><br>'+
    'w\u2082 = '+s.w2.toFixed(3)+' + ('+s.a.toFixed(2)+' \u00d7 '+s.err+' \u00d7 '+s.p2+') = <strong>'+s.nw2.toFixed(4)+'</strong><br>'+
    'b &nbsp; = '+s.b.toFixed(3)+' + ('+s.a.toFixed(2)+' \u00d7 '+s.err+') &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;= <strong>'+s.nb.toFixed(4)+'</strong>';
  }
  document.getElementById('mtext').innerHTML=html;

  var prev=cur>0?eps[cur-1]:null;
  var pv=prev?[prev.nw1,prev.nw2,prev.nb]:null;
  var cv=[s.w1,s.w2,s.b], cl=['w\u2081','w\u2082','b'], ch='';
  cv.forEach(function(val,i){
    var up=pv&&val>pv[i], dn=pv&&val<pv[i];
    ch+='<span class="wchip'+(up?' up':dn?' dn':'')+'">'+(up?'\u2191 ':dn?'\u2193 ':'')+cl[i]+' = '+val.toFixed(4)+'</span>';
  });
  document.getElementById('chips').innerHTML=ch;

  var last=eps[eps.length-1];
  document.getElementById('cmsg').textContent=
    last.ok&&cur===eps.length-1?'\u2713 Converged at epoch '+last.e:
    !last.ok&&cur===eps.length-1?'Did not converge in '+eps.length+' epochs':'';

  document.getElementById('bp').disabled=cur===0;
  document.getElementById('bn').disabled=cur===eps.length-1;
  resizeHost();
}

function run(){eps=compute();cur=0;render();}
function go(d){cur=Math.max(0,Math.min(eps.length-1,cur+d));render();}
function resizeHost(){
  setTimeout(function(){
    try{
      var demo=document.querySelector('.perceptron-demo');
      var height=demo?demo.getBoundingClientRect().height:document.body.scrollHeight;
      if(window.frameElement){window.frameElement.style.height=Math.ceil(height)+'px';}
    }catch(e){}
  },0);
}
window.addEventListener('resize',function(){drawChart();resizeHost();});
run();
</script>
